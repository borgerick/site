<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Infos — POC</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <style>
    .infos-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 120px;
    }

    .infos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 640px) {
      .infos-grid { grid-template-columns: 1fr; }
    }

    /* Foto */
    .infos-photo {
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #1d1d1f;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }

    .infos-photo img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    /* Cards contato */
    .infos-contacts {
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: #111;
      border: 1px solid #1d1d1f;
      border-radius: 20px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity .6s ease, transform .6s ease,
                  border-color .3s ease, box-shadow .3s ease;
    }

    .contact-card.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .contact-card:hover {
      transform: translateY(-4px) !important;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .contact-card.instagram:hover { border-color: rgba(225,48,108,.4); }
    .contact-card.whatsapp:hover  { border-color: rgba(37,211,102,.4); }

    .contact-icon {
      font-size: 2.4rem;
      flex-shrink: 0;
    }

    .contact-info h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f5f5f7;
    }

    .contact-info p {
      font-size: .88rem;
      color: #6e6e73;
      line-height: 1.5;
    }

    .contact-arrow {
      margin-left: auto;
      color: #6e6e73;
      font-size: 1.1rem;
      transition: transform .2s ease;
    }

    .contact-card:hover .contact-arrow {
      transform: translateX(4px);
      color: #f5f5f7;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo">
      <img src="{{ url_for('static', filename='imagens/LOGO POC BRANCO.png') }}" alt="POC" style="height:60px;"/>
    </a>
  </nav>

  <!-- HERO -->
  <div class="inner-hero">
    <a href="/" class="inner-back">← Voltar</a>
    <p class="inner-eyebrow">Fale com a gente</p>
    <h1 class="inner-title">Infos</h1>
    <p class="inner-desc">Conheça nossa equipe e entre em contato pelo canal que preferir.</p>
  </div>

  <!-- CONTEÚDO -->
  <section class="infos-section">
    <div class="infos-grid">

      <!-- FOTO -->
      <div class="infos-photo">
        <img src="{{ url_for('static', filename='imagens/ERICK NICO.png') }}" alt="Equipe POC"/>
      </div>

      <!-- CONTATOS -->
      <div class="infos-contacts">

        <a href="https://www.instagram.com/poc.tec/" target="_blank" class="contact-card instagram">
          <span class="contact-icon">📸</span>
          <div class="contact-info">
            <h3>Instagram</h3>
            <p>Nos siga e fale pelo Direct.<br>@poc.tec</p>
          </div>
          <span class="contact-arrow">→</span>
        </a>

        <a href="https://wa.me/message/HXNYLLF2MGRIE1" target="_blank" class="contact-card whatsapp">
          <span class="contact-icon">💬</span>
          <div class="contact-info">
            <h3>WhatsApp</h3>
            <p>Atendimento rápido e personalizado pelo WhatsApp da loja.</p>
          </div>
          <span class="contact-arrow">→</span>
        </a>

      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 POC. Todos os direitos reservados. · <a href="/">Voltar ao início</a></p>
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 150);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.contact-card').forEach(el => observer.observe(el));
  </script>

</body>
</html>
